<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Method Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a2e;--muted:#6b6b80;--line:#d9d9e3;--ok:#1f7a3d;--okbg:#e3f5e9;--warn:#9a5b00;--warnbg:#fdeecf;--bad:#a33;--badbg:#fbe6e6;--blue:#3a4a8c;--bluebg:#e6e9f7;--red:#b3261e;--redbg:#fce8e6;}
  *{box-sizing:border-box;}
  body{font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);margin:0;background:#f7f7fa;}
  .wrap{max-width:780px;margin:0 auto;padding:28px 24px 60px;}
  h1{font-family:'Fraunces',Georgia,serif;font-size:30px;font-weight:600;margin:0 0 4px;letter-spacing:-.5px;}
  .sub{color:var(--muted);margin-bottom:18px;font-size:14px;}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  label.fld{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;display:block;}
  select,input[type=number]{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--line);font-size:15px;background:#fff;color:var(--ink);font-family:inherit;}
  .seg{display:flex;gap:6px;background:#ececf3;padding:4px;border-radius:10px;}
  .seg button{flex:1;padding:9px 0;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;}
  .seg button.on{background:var(--ink);color:#fff;}
  .check{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;user-select:none;}
  .banner{background:#f3f1fb;border:1.5px solid #e3def5;border-radius:10px;padding:10px 14px;font-size:13px;margin:16px 0;}
  .section{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;}
  .card{border:1.5px solid #ececf0;background:#fafafb;border-radius:12px;padding:13px 15px;margin-bottom:8px;opacity:.62;}
  .card.ok{border-color:#cde6d4;background:#fff;opacity:1;}
  .mhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .mname{font-weight:600;font-size:15px;}
  .mprov{font-size:12px;color:#8a8a9c;}
  .limits{font-size:13px;color:#555;margin-top:4px;}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
  .hint{color:#9a9aac;font-size:14px;margin-top:30px;text-align:center;}
  .foot{font-size:11px;color:#a9a9b8;margin-top:24px;border-top:1px solid var(--line);padding-top:12px;}
  .none{color:var(--warn);font-size:14px;}
  @media (max-width:560px){.controls{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Payment Method Lookup</h1>
  <div class="sub">Выбери страну и сумму — увидишь доступные методы. Источник данных: страница Cashier Operations.</div>
  <div id="syncDate" style="display:inline-block;font-size:12px;font-weight:600;color:var(--muted);background:#ececf3;padding:4px 10px;border-radius:20px;margin-bottom:16px;">загрузка…</div>

  <div class="controls">
    <div>
      <label class="fld">Страна</label>
      <select id="country"><option value="">Выбери страну…</option></select>
    </div>
    <div>
      <label class="fld">Сумма <span id="curlbl"></span></label>
      <input id="amount" type="number" placeholder="напр. 100">
    </div>
  </div>
  <div class="controls" style="margin-bottom:14px;">
    <div>
      <label class="fld">Транзакция</label>
      <div class="seg" id="seg">
        <button data-v="deposit" class="on">Депозит</button>
        <button data-v="withdrawal">Вывод</button>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;">
      <label class="check" id="fdwrap" style="margin-bottom:9px;">
        <input type="checkbox" id="firstDeposit"> Первый депозит игрока
      </label>
    </div>
  </div>
  <div id="out"><div class="hint">Загрузка данных…</div></div>
</div>

<script>
let DATA=null;
let txn="deposit";
const fmt=(s,v)=>v==null?"—":s+Number(v).toLocaleString();

async function boot(){
  try{
    const res=await fetch("data/methods.json?v="+Date.now());
    if(!res.ok)throw new Error("HTTP "+res.status);
    DATA=await res.json();
  }catch(e){
    document.getElementById("out").innerHTML='<div class="none">Не удалось загрузить data/methods.json: '+e.message+'</div>';
    document.getElementById("syncDate").textContent="⚠ ошибка загрузки данных";
    return;
  }
  init();
}

function init(){
  document.getElementById("syncDate").textContent="🔄 Данные обновлены: "+DATA._meta.lastSynced+" (стр. v"+DATA._meta.sourceVersion+")";
  const ALL=[...Object.keys(DATA.local),...DATA.generalCountries].sort();
  const sel=document.getElementById("country");
  ALL.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c+(DATA.local[c]?"  ★ локальные методы":"");sel.appendChild(o);});

  document.querySelectorAll("#seg button").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");txn=b.dataset.v;document.getElementById("fdwrap").style.display=txn==="deposit"?"flex":"none";render();});});
  ["country","amount","firstDeposit"].forEach(id=>document.getElementById(id).addEventListener("input",render));
  document.getElementById("out").innerHTML='<div class="hint">Выбери страну, чтобы начать.</div>';
}

function fdPill(fd){const L=DATA.firstDepositLabels[fd];if(!L)return null;return [L.label,"var(--"+L.color+")","var(--"+L.color+"bg)"];}

function render(){
  const sel=document.getElementById("country");
  const country=sel.value,out=document.getElementById("out");
  const amtRaw=document.getElementById("amount").value;
  const amt=amtRaw===""?null:parseFloat(amtRaw);
  const firstDeposit=document.getElementById("firstDeposit").checked;
  if(!country){out.innerHTML='<div class="hint">Выбери страну, чтобы начать.</div>';document.getElementById("curlbl").textContent="";return;}
  const isLocal=!!DATA.local[country];
  const market=isLocal?DATA.local[country]:{currency:"USD",symbol:"$"};
  const sym=market.symbol;
  document.getElementById("curlbl").textContent="("+market.currency+")";
  let pool;
  if(isLocal){
    if(txn==="withdrawal"&&market.withdrawals.length)pool=[...market.deposits.filter(m=>m.minW!=null),...market.withdrawals];
    else pool=market.deposits;
  }else pool=DATA.general.methods;
  const rows=pool.map(m=>{
    const reasons=[];let eligible=true;
    if(txn==="deposit"){
      if(m.minD==null){eligible=false;reasons.push("не метод депозита");}
      else if(amt!=null){
        if(amt<m.minD){eligible=false;reasons.push("ниже мин "+fmt(sym,m.minD));}
        if(m.maxD!=null&&amt>m.maxD){eligible=false;reasons.push("выше макс "+fmt(sym,m.maxD));}
      }
      if(firstDeposit&&eligible){
        if(m.fd==="no"){eligible=false;reasons.push("только повторным");}
        if(m.fd==="conditional")reasons.push("1-й депозит: только PS Sochi");
        if(m.fd==="withdrawal"){eligible=false;reasons.push("только вывод");}
        if(m.fd==="twoDeposits"){eligible=false;reasons.push("нужно 2+ депозита");}
      }
    }else{
      if(m.minW==null){eligible=false;reasons.push("не метод вывода");}
      else if(amt!=null){
        if(amt<m.minW){eligible=false;reasons.push("ниже мин "+fmt(sym,m.minW));}
        if(m.maxW!=null&&amt>m.maxW){eligible=false;reasons.push("выше макс "+fmt(sym,m.maxW));}
      }
    }
    return{m,eligible,reasons};
  });
  const ok=rows.filter(r=>r.eligible),bad=rows.filter(r=>!r.eligible),isW=txn==="withdrawal";
  let html='<div class="banner">';
  html+=isLocal?'<strong>'+country+'</strong> — локальные методы (валюта: '+market.currency+').':'<strong>'+country+'</strong> — общие / международные методы (USD). Лимиты вывода: '+DATA.generalWithdrawalLimits+'.';
  if(amt!=null)html+=' Показаны методы для <strong>'+fmt(sym,amt)+'</strong> ('+(isW?"вывод":"депозит")+').';
  html+='</div>';
  html+='<div class="section">✅ Доступно ('+ok.length+')</div>';
  if(!ok.length)html+='<div class="none">Нет методов под эту сумму/транзакцию. Проверь список ниже с лимитами.</div>';
  ok.forEach(r=>{const m=r.m,b=txn==="deposit"?fdPill(m.fd):null;
    html+='<div class="card ok"><div class="mhead"><div><span class="mname">'+m.method+'</span> <span class="mprov">· '+m.type+' · '+m.provider+'</span></div>';
    if(b)html+='<span class="pill" style="color:'+b[1]+';background:'+b[2]+'">'+b[0]+'</span>';
    html+='</div><div class="limits">';
    html+=isW?'Вывод: '+fmt(sym,m.minW)+' – '+fmt(sym,m.maxW):'Депозит: '+fmt(sym,m.minD)+' – '+fmt(sym,m.maxD);
    if(m.note)html+=' · <em>'+m.note+'</em>';
    if(r.reasons.length)html+=' · прим.: '+r.reasons.join(", ");
    html+='</div></div>';});
  if(bad.length){
    html+='<div class="section">🚫 Недоступно ('+bad.length+')</div>';
    bad.forEach(r=>{const m=r.m;
      html+='<div class="card"><div class="mhead"><div><span class="mname">'+m.method+'</span> <span class="mprov">· '+m.provider+'</span></div>';
      html+='<span class="pill" style="color:var(--bad);background:var(--badbg)">'+r.reasons[0]+'</span></div><div class="limits">';
      html+=isW?'Вывод: '+fmt(sym,m.minW)+' – '+fmt(sym,m.maxW):'Депозит: '+fmt(sym,m.minD)+' – '+fmt(sym,m.maxD);
      html+='</div></div>';});
  }
  html+='<div class="foot">Данные синхронизированы с Cashier Operations (page '+DATA._meta.sourcePageId+') '+DATA._meta.lastSynced+' · версия страницы '+DATA._meta.sourceVersion+'.</div>';
  out.innerHTML=html;
}

boot();
</script>
</body>
</html>
